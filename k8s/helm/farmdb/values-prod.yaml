replicaCount: 2

image:
  repository: carbonbitshq/farmdb
  pullPolicy: IfNotPresent
  tag: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: farmdb.carbonbits.work
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
